format = "[蟬ｶ](#7aa2f7)$directory[蟬ｴ](fg:#7aa2f7 bg:#3b4261)$git_branch[蟬ｴ](fg:#3b4261) $character"
add_newline = false

[directory]
style = "bg:#7aa2f7 fg:#15161e"
format = "[ $path ]($style)"

[git_branch]
symbol = "㬚瓦 "
style = "bg:#3b4261 fg:#7aa2f7"
format = "[[ $symbol$branch ]($style)]"

[character]
success_symbol = "[㬚┏](bold green) "
error_symbol = "[㬚Ō](bold red) "